<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="logo">Dashboard Admin</div>
</header>

<div class="live-stats">

<div class="stat-card">
💰 <b>Rp 12.540.000</b><br>
Pendapatan Hari Ini

Pesanan Masuk
</div>

<div class="stat-card">

Pengunjung

</div>

<div class="products">

<div class="card">
<h3>Tambah Produk</h3>
<input type="text" placeholder="Nama Produk" style="width:100%;padding:10px;margin-top:10px;">
<input type="number" placeholder="Harga" style="width:100%;padding:10px;margin-top:10px;">
<button style="margin-top:10px;">Tambah Produk</button>
</div>

<div class="card">
<h3>Kelola Testimoni</h3>
<textarea placeholder="Tambah testimoni" style="width:100%;height:120px;padding:10px;margin-top:10px;"></textarea>
<button style="margin-top:10px;">Upload Testimoni</button>
</div>

<div class="card">
<h3>Pesanan Masuk</h3>

</div>

</body>
</html>
