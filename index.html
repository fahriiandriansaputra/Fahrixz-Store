<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrixz Store</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<header>
<div class="logo">Fahrixz Store</div>
<div class="top-actions">
<button onclick="toggleDarkMode()" class="icon-btn"><i class="fa-solid fa-moon"></i></button>
<a href="admin.html" class="icon-btn"><i class="fa-solid fa-user-shield"></i></a>
<div class="cart-btn" onclick="openCart()">
<i class="fa-solid fa-cart-shopping"></i>
<span id="cartCount">0</span>
</div>
</div>
</header>

<div class="promo">🔥 Promo Upgrade Premium Mulai 35K</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Cari produk..." onkeyup="searchProduct()">
</div>

<section>
<h2>Produk Premium</h2>
<div class="products" id="productList"></div>
</section>

<div class="cart" id="cart">
<div class="cart-header">
<h2>Keranjang</h2>
<span onclick="closeCart()">×</span>
</div>
<div id="cartItems"></div>
<div class="checkout-box">
<p>Subtotal: <span id="subtotal">Rp 0</span></p>
<p>Biaya Admin: <span id="adminFee">Rp 0</span></p>
<h3>Total: <span id="total">Rp 0</span></h3>
<button onclick="checkout()">Checkout</button>
</div>
</div>

<div class="popup" id="paymentPopup">
<div class="popup-content">
<h2>Pembayaran QRIS</h2>
<p>Pastikan transfer sesuai pesanan yang dibuat!</p>
<img src="qris.jpg" class="qris-img">
<a href="qris.jpg" download class="download-btn">Download QRIS</a>
<div id="countdown">01:00:00</div>
<input type="file" id="proof">
<button onclick="sendProof()">Kirim Bukti Pembayaran</button>
<button onclick="closePopup()">Tutup</button>
</div>
</div>

<div class="chat-toggle" onclick="toggleChat()">💬</div>
<div class="chat-box" id="chatBox">
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input">
<input type="text" id="chatInput" placeholder="Ketik pesan...">
<button onclick="sendChat()">Kirim</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
