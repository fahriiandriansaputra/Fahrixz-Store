<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>FAHRIXZ STORE</title>

<link rel="stylesheet"
href="style.css">

</head>


<body>


<div id="loading">

<div class="loader"></div>

</div>



<header>

<h1>

FAHRIXZ STORE

</h1>


<div class="top">

<input
id="search"

placeholder="Cari produk...">


<button
class="cartBtn"

onclick="openCart()">

🛒
<span id="cartCount">

0

</span>

</button>


</div>

</header>




<div class="banner">

<img
src="img/banner1.jpg">

</div>




<section id="home">

<h2>

Upgrade E-Wallet

</h2>

<div
class="produk"

id="produk">

</div>



<h2>

Top Up Game

</h2>

<div

class="produk"

id="game">

</div>

</section>




<section
id="cartPage">

<h2>

Keranjang

</h2>

<div id="cartItem">

</div>

<h3>

Subtotal :

Rp

<span id="subtotal">

0

</span>

</h3>


<button
class="buy"

onclick="checkout()">

Checkout

</button>

</section>




<section id="cuan">

<h2>

Cari Cuan

</h2>


<div class="saldo">

Saldo:

Rp

<span id="saldoText">

0

</span>

</div>



<div class="task">

Install APK

Reward:

Rp5000

<br><br>

<input
type="file"

id="bukti">


<button
onclick="claimTask()">

Kirim Bukti

</button>

</div>

</section>




<div
id="detail"

class="popup">

<div
class="detailBox">

<img
id="detailImg">


<h2
id="detailNama">

</h2>


<p
id="detailHarga">

</p>


<p>

Garansi 1 Minggu

</p>


<button
onclick="addDetail()">

Tambah Keranjang

</button>


<button
onclick="closeDetail()">

Tutup

</button>

</div>

</div>




<nav>

<button
onclick="showHome()">

HOME

</button>



<button
onclick="showCuan()">

CARI CUAN

</button>



<button
onclick="openCart()">

KERANJANG

</button>

</nav>


<script src="script.js">

</script>

</body>
</html>
