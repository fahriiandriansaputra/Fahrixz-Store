<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="popup-content" style="margin:100px auto;display:block;max-width:400px;">
<h2>Login Admin</h2>
<input type="text" id="username" placeholder="Username" style="width:100%;padding:14px;margin:10px 0;">
<input type="password" id="password" placeholder="Password" style="width:100%;padding:14px;margin:10px 0;">
<button onclick="loginAdmin()" style="width:100%;padding:14px;background:#2563eb;color:#fff;border:none;border-radius:12px;">Login</button>
</div>
<script src="admin.js"></script>
</body>
</html>
